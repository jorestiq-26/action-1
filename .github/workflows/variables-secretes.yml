name: Exploring Variables and Secrets

on:
  push

env:
    CONTAINER_REGISTRY: docker.io
    IMAGE_NAME: github-actions-nginx
jobs:  
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Docker Build
        run: echo docker build -t ${{ env.CONTAINER_REGISTRY }}/${{ var.{{ vars.DOCKER_USERNAME }} }}/$IMAGE_NAME:latest

      - name: Docker Login

        run: echo docker login --username=${{ var.{{ vars.DOCKER_USERNAME }} }} --password=${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Publish
        run: echo docker push $CONTAINER_REGISTRY/${{ var.{{ vars.DOCKER_USERNAME }} }}/$IMAGE_NAME:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Docker Run
        run: echo docker run -d -p 8080:80 $CONTAINER_REGISTRY/${{ var.{{ vars.DOCKER_USERNAME }} }}/$IMAGE_NAME:latest

